<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferry Golfo · Puntarenas ↔ Paquera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --deep: #0d2240;
    --mid: #1a3a5c;
    --teal: #1b8c7a;
    --teal-light: #2ab09b;
    --gold: #c9a84c;
    --gold-light: #e8c96b;
    --foam: #e8f4f2;
    --mist: #b8d4cc;
    --text: #f0ede6;
    --text-muted: #8fa8b8;
    --card-bg: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ocean wave background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 120% 60% at 50% -20%, #1a3a5c 0%, transparent 70%),
      radial-gradient(ellipse 80% 40% at 80% 100%, #0f2a3a 0%, transparent 60%),
      var(--navy);
    z-index: 0;
    pointer-events: none;
  }

  .app { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 0 100px; }

  /* Header */
  .header {
    padding: 28px 24px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 0.5px solid var(--card-border);
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-wave {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--teal-light);
    font-weight: 500;
  }

  .logo-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--text);
    line-height: 1.1;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .lang-switcher {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 4px;
  }

  .lang-btn {
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    color: var(--text-muted);
    padding: 0;
    transition: color 0.2s;
  }

  .lang-btn.active { color: var(--gold); font-weight: 500; }
  .lang-btn:hover { color: var(--text); }
  .lang-sep { color: var(--card-border); font-size: 10px; }

  /* Route banner */
  .route-banner {
    margin: 24px 24px 0;
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .route-port {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .port-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--text);
  }

  .port-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .route-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .arrow-line {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--teal-light);
    font-size: 18px;
  }

  .route-duration {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-align: center;
  }

  /* Ferry animation */
  .ferry-track {
    height: 2px;
    width: 80px;
    background: linear-gradient(90deg, var(--teal) 0%, var(--teal-light) 100%);
    border-radius: 2px;
    position: relative;
    overflow: visible;
  }

  .ferry-icon {
    position: absolute;
    top: -7px;
    left: 0;
    font-size: 14px;
    animation: sailAcross 4s ease-in-out infinite;
  }

  @keyframes sailAcross {
    0%, 100% { left: 0; opacity: 1; }
    45% { left: calc(100% - 14px); opacity: 1; }
    50% { left: calc(100% - 14px); opacity: 0; }
    51% { left: 0; opacity: 0; }
    55% { left: 0; opacity: 1; }
  }

  /* Schedule strip */
  .schedule-strip {
    margin: 16px 24px 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .schedule-strip::-webkit-scrollbar { display: none; }

  .time-pill {
    flex-shrink: 0;
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    transition: all 0.2s;
  }

  .time-pill:hover { border-color: var(--teal); background: rgba(27,140,122,0.1); }

  .time-val { font-weight: 500; color: var(--text); font-size: 13px; }
  .time-dir { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

  /* Tabs */
  .tabs {
    display: flex;
    margin: 28px 24px 0;
    border-bottom: 0.5px solid var(--card-border);
    gap: 0;
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 8px 14px;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .tab::after {
    content: '';
    position: absolute;
    bottom: -0.5px;
    left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.25s;
    border-radius: 2px 2px 0 0;
  }

  .tab.active { color: var(--text); }
  .tab.active::after { transform: scaleX(1); }
  .tab:hover { color: var(--text); }

  .tab-icon { font-size: 14px; }

  /* Panels */
  .panel { display: none; padding: 24px 24px 0; }
  .panel.active { display: block; }

  /* Section label */
  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--teal-light);
    margin-bottom: 16px;
    font-weight: 500;
  }

  /* Tour cards */
  .tours-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .tour-card {
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .tour-card:hover { border-color: rgba(255,255,255,0.15); }

  .tour-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 18px 14px;
  }

  .tour-emoji {
    font-size: 32px;
    flex-shrink: 0;
    line-height: 1;
  }

  .tour-info { flex: 1; }

  .tour-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.25;
  }

  .tour-subtitle {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--teal-light);
    margin-bottom: 6px;
  }

  .tour-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .tour-meta {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--card-border);
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .tag.highlight {
    border-color: var(--gold);
    color: var(--gold);
  }

  .tour-footer {
    padding: 12px 18px 16px;
    border-top: 0.5px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .price-block { display: flex; flex-direction: column; gap: 1px; }
  .price-from { font-size: 10px; color: var(--text-muted); }
  .price-val {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
  }
  .price-per { font-size: 10px; color: var(--text-muted); }

  .book-btn {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 24px;
    padding: 9px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .book-btn:hover { background: var(--teal-light); }

  /* Curiosities */
  .curio-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .curio-card {
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 14px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .curio-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-1px); }

  .curio-card.expanded {
    grid-column: span 2;
  }

  .curio-emoji { font-size: 28px; margin-bottom: 10px; line-height: 1; }

  .curio-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.25;
  }

  .curio-teaser {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .curio-full {
    display: none;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid var(--card-border);
  }

  .curio-card.expanded .curio-full { display: block; }
  .curio-card.expanded .curio-teaser { display: none; }

  .curio-tap {
    font-size: 10px;
    color: var(--teal-light);
    margin-top: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Wildlife radar */
  .wildlife-section {
    margin-top: 28px;
  }

  .wildlife-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 0.5px solid var(--card-border);
  }

  .wildlife-row:last-child { border-bottom: none; }

  .wildlife-emoji { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }

  .wildlife-info { flex: 1; }

  .wildlife-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .wildlife-detail {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .sighting-bar {
    width: 60px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sighting-fill {
    height: 100%;
    background: var(--teal-light);
    border-radius: 4px;
    transition: width 1s ease;
  }

  /* Info panel */
  .info-section { margin-bottom: 28px; }

  .info-card {
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 12px;
  }

  .info-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.04);
    font-size: 13px;
  }

  .info-row:last-child { border-bottom: none; }

  .info-key { color: var(--text-muted); }
  .info-val { color: var(--text); font-weight: 500; text-align: right; }
  .info-val.highlight { color: var(--gold); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10, 22, 40, 0.95);
    border-top: 0.5px solid var(--card-border);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 20px;
    backdrop-filter: blur(20px);
    z-index: 100;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 20px;
    transition: all 0.2s;
  }

  .nav-icon { font-size: 20px; }
  .nav-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-item.active .nav-label { color: var(--gold); }

  /* Booking modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5, 15, 30, 0.88);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #0e2035;
    border: 0.5px solid var(--card-border);
    border-radius: 20px 20px 0 0;
    padding: 24px 24px 40px;
    width: 100%;
    max-width: 680px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: 4px;
  }

  .modal-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid var(--card-border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--teal); }

  .submit-btn {
    width: 100%;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.2s;
    letter-spacing: 0.5px;
  }

  .submit-btn:hover { background: var(--teal-light); }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--text-muted);
    border-radius: 50%;
    width: 30px; height: 30px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }

  .modal { position: relative; }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--teal);
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Offline banner */
  .hidden { display: none; }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <span class="logo-wave">⚓ Travesía</span>
      <span class="logo-name">Ferry Golfo</span>
      <span class="logo-sub">Puntarenas · Nicoya Peninsula</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('EN')">EN</button>
        <span class="lang-sep">·</span>
        <button class="lang-btn" onclick="setLang('ES')">ES</button>
        <span class="lang-sep">·</span>
        <button class="lang-btn" onclick="setLang('FR')">FR</button>
      </div>
    </div>
  </div>

  <!-- Route banner -->
  <div class="route-banner">
    <div class="route-port">
      <span class="port-label" data-i18n="departure">Departure</span>
      <span class="port-name">Puntarenas</span>
    </div>
    <div class="route-arrow">
      <div class="arrow-line">
        <div class="ferry-track">
          <span class="ferry-icon">⛴</span>
        </div>
      </div>
      <span class="route-duration" data-i18n="duration">~1h 15min</span>
    </div>
    <div class="route-port" style="text-align:right;">
      <span class="port-label" data-i18n="arrival">Arrival</span>
      <span class="port-name">Paquera</span>
    </div>
  </div>

  <!-- Schedule -->
  <div class="schedule-strip" id="schedule-strip">
    <!-- filled by JS -->
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('tours')" id="tab-tours">
      <span class="tab-icon">🗺</span>
      <span data-i18n="tabTours">Tours</span>
    </button>
    <button class="tab" onclick="switchTab('curio')" id="tab-curio">
      <span class="tab-icon">🦜</span>
      <span data-i18n="tabCurio">Curiosities</span>
    </button>
    <button class="tab" onclick="switchTab('info')" id="tab-info">
      <span class="tab-icon">ℹ</span>
      <span data-i18n="tabInfo">Info</span>
    </button>
  </div>

  <!-- Tours Panel -->
  <div class="panel active" id="panel-tours">
    <p class="section-label" data-i18n="toursLabel">Experiences from Paquera</p>
    <div class="tours-grid" id="tours-grid">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Curiosities Panel -->
  <div class="panel" id="panel-curio">
    <p class="section-label" data-i18n="curioLabel">Did you know?</p>
    <div class="curio-grid" id="curio-grid">
      <!-- filled by JS -->
    </div>
    <div class="wildlife-section">
      <p class="section-label" data-i18n="wildlifeLabel">Wildlife radar · Gulf of Nicoya</p>
      <div id="wildlife-list">
        <!-- filled by JS -->
      </div>
    </div>
  </div>

  <!-- Info Panel -->
  <div class="panel" id="panel-info">
    <div id="info-content">
      <!-- filled by JS -->
    </div>
  </div>

</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('tours')" id="nav-tours">
    <span class="nav-icon">🗺</span>
    <span class="nav-label" data-i18n="tabTours">Tours</span>
  </button>
  <button class="nav-item" onclick="switchTab('curio')" id="nav-curio">
    <span class="nav-icon">🦜</span>
    <span class="nav-label" data-i18n="tabCurio">Curiosities</span>
  </button>
  <button class="nav-item" onclick="switchTab('info')" id="nav-info">
    <span class="nav-icon">ℹ</span>
    <span class="nav-label" data-i18n="tabInfo">Info</span>
  </button>
</div>

<!-- Booking Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Book Tour</div>
    <div class="modal-subtitle" id="modal-subtitle">Reserve your spot · Confirmation by email</div>
    <div class="form-group">
      <label class="form-label" data-i18n="formName">Full Name</label>
      <input type="text" class="form-input" id="form-name" placeholder="María González">
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="formEmail">Email</label>
      <input type="email" class="form-input" id="form-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="formDate">Preferred Date</label>
      <input type="date" class="form-input" id="form-date">
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="formGuests">Guests</label>
      <select class="form-input" id="form-guests">
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5+</option>
      </select>
    </div>

}

function switchTab(tab) {
  ['tours','curio','info'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('nav-' + t).classList.toggle('active', t === tab);
  });
}

function renderSchedule() {
  const strip = document.getElementById('schedule-strip');
  strip.innerHTML = SCHEDULE.map(s => `
    <div class="time-pill">
      <span class="time-val">${s.time}</span>
      <span class="time-dir">${s.dir[lang.current]}</span>
    </div>
  `).join('');
}

function renderTours() {
  const l = lang.current;
  document.getElementById('tours-grid').innerHTML = TOURS.map((tour, i) => `
    <div class="tour-card">
      <div class="tour-header">
        <div class="tour-emoji">${tour.emoji}</div>
        <div class="tour-info">
          <div class="tour-subtitle">${tour.subtitle[l]}</div>
          <div class="tour-title">${tour.title[l]}</div>
          <div class="tour-desc">${tour.desc[l]}</div>
          <div class="tour-meta">
            ${tour.tags[l].map((tag, ti) => `<span class="tag${ti === 0 ? ' highlight' : ''}">${tag}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="tour-footer">
        <div class="price-block">
          <span class="price-from">${t('from')}</span>
          <span class="price-val">$${tour.price}</span>
          <span class="price-per">${t('perPerson')}</span>
        </div>
        <button class="book-btn" onclick="openModal(${i})">${t('bookNow')}</button>
      </div>
    </div>
  `).join('');
}

function renderCurio() {
  const l = lang.current;
  document.getElementById('curio-grid').innerHTML = CURIOSITIES.map((c, i) => `
    <div class="curio-card" id="curio-${i}" onclick="toggleCurio(${i})">
      <div class="curio-emoji">${c.emoji}</div>
      <div class="curio-title">${c.title[l]}</div>
      <div class="curio-teaser">${c.teaser[l]}</div>
      <div class="curio-full">${c.full[l]}</div>
      <div class="curio-tap">${t('readMore')}</div>
    </div>
  `).join('');

  document.getElementById('wildlife-list').innerHTML = WILDLIFE.map(w => `
    <div class="wildlife-row">
      <div class="wildlife-emoji">${w.emoji}</div>
      <div class="wildlife-info">
        <div class="wildlife-name">${w.name[l]}</div>
        <div class="wildlife-detail">${w.detail[l]}</div>
      </div>
      <div class="sighting-bar">
        <div class="sighting-fill" style="width: ${w.chance}%"></div>
      </div>
    </div>
  `).join('');
}

function renderInfo() {
  const sections = INFO_SECTIONS[lang.current];
  document.getElementById('info-content').innerHTML = sections.map(sec => `
    <div class="info-section">
      <div class="info-card">
        <div class="info-card-title">${sec.title}</div>
        ${sec.rows.map(r => `
          <div class="info-row">
            <span class="info-key">${r.k}</span>
            <span class="info-val${r.hi ? ' highlight' : ''}">${r.v}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderAll() {
  renderSchedule();
  renderTours();
  renderCurio();
  renderInfo();
}

function toggleCurio(i) {
  const card = document.getElementById('curio-' + i);
  const wasExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.curio-card').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) card.classList.add('expanded');
}

function openModal(tourIndex) {
  activeTour = tourIndex;
  const tour = TOURS[tourIndex];
  const l = lang.current;
  document.getElementById('modal-title').textContent = tour.title[l];
  document.getElementById('modal-subtitle').textContent = `$${tour.price} ${t('perPerson')} · ${tour.tags[l][0]}`;
  document.getElementById('modal-overlay').classList.add('open');
  // Set min date to today
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('form-date').min = today;
  document.getElementById('form-date').value = today;
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay') || e.currentTarget?.classList?.contains('modal-close')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function submitBooking() {
  const name = document.getElementById('form-name').value.trim();
  const email = document.getElementById('form-email').value.trim();
  if (!name || !email) {
    showToast('Please fill in name and email');
    return;
  }
  document.getElementById('modal-overlay').classList.remove('open');
  showToast(t('toastMsg'));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

renderAll();
</script>
</body>
</html>
